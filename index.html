<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#FDF4EC" />
  <meta name="description" content="SwiftShare — Zero-login instant file transfer. Drop, share, done." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta property="og:title" content="SwiftShare — Instant File Transfer" />
  <meta property="og:description" content="Zero-login file sharing. Drop, share, done." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://swiftshare.app" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>SwiftShare</title>
  <script>
    // FOUC prevention: set theme + body background BEFORE any CSS loads
    // This is the ONLY place where theme initialization should happen
    (function () {
      try {
        var valid = ['system', 'sunrise', 'sunset', 'dark', 'light', 'midnight', 'sakura', 'lavender', 'forest', 'volcanic'];
        // Map each theme to its exact --bg value so body never flashes wrong color
        var bgMap = {
          sunrise: '#FDF9F3',
          sunset: '#0C0502',
          dark: '#09090B',
          light: '#FAFAFA',
          midnight: '#000000',
          sakura: '#F5F9FC',
          lavender: '#0A0618',
          forest: '#050C08',
          volcanic: '#0D0505'
        };
        var colorMap = {
          sunrise: '#1C1917',
          sunset: '#FDF3E8',
          dark: '#FAFAFA',
          light: '#09090B',
          midnight: '#D0E4FA',
          sakura: '#420818',
          lavender: '#F0ECFF',
          forest: '#DCF5E8',
          volcanic: '#FFE8E8'
        };
        var raw = localStorage.getItem('swiftshare_theme');
        var parsed = raw ? JSON.parse(raw) : null;
        var theme = parsed && valid.indexOf(parsed) !== -1 ? parsed : 'sunset';
        document.documentElement.setAttribute('data-theme', theme);
        // Set background + text color immediately to prevent FOUC
        document.documentElement.style.backgroundColor = bgMap[theme] || bgMap.sunset;
        document.documentElement.style.color = colorMap[theme] || colorMap.sunset;
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'sunset');
        document.documentElement.style.backgroundColor = '#0C0502';
        document.documentElement.style.color = '#FDF3E8';
      }
    })();
  </script>
  <style>
    /* CRITICAL: Prevent white flashes and scrollbar layout shifts during page load */
    html,
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      background-color: inherit;
      color: inherit;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />
</head>

<body>
  <script>
    // Load and apply reduced motion preference before any elements or scripts render
    (function () {
      try {
        var settingsRaw = localStorage.getItem('swiftshare_settings');
        var settings = settingsRaw ? JSON.parse(settingsRaw) : null;
        var reducedMotion = false;
        if (settings && typeof settings.reducedMotion === 'boolean') {
          reducedMotion = settings.reducedMotion;
        } else {
          reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }
        if (reducedMotion) {
          document.body.classList.add('reduce-motion');
        }
      } catch (e) { }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
