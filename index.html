<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#FDF4EC" />
    <meta name="description" content="SwiftShare — Zero-login instant file transfer. Drop, share, done." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta property="og:title" content="SwiftShare — Instant File Transfer" />
    <meta property="og:description" content="Zero-login file sharing. Drop, share, done." />
    <meta property="og:image" content="https://your-frontend.vercel.app/og-image.png" />
    <meta property="og:url" content="https://your-frontend.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>SwiftShare</title>
    <script>
      (function() {
        try {
          var valid = ['sunset','dark','light','midnight','sakura','lavender','forest','volcanic'];
          var raw = localStorage.getItem('swiftshare_theme');
          var parsed = raw ? JSON.parse(raw) : null;
          var theme = parsed && valid.indexOf(parsed) !== -1 ? parsed : 'sunset';
          document.documentElement.setAttribute('data-theme', theme);
          if (['dark','midnight','volcanic'].includes(theme)) {
            document.documentElement.style.backgroundColor = '#121212';
            document.documentElement.style.color = '#ffffff';
          }
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'sunset');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
